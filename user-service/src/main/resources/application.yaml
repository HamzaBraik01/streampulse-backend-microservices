spring:
  application:
    name: user-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/user-db
    username: postgres
    password: ${password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    generate-ddl: true
  cloud:
    config:
      enabled: false

server:
  port: 8081

eureka:
  client:
    enabled: false
  instance:
    prefer-ip-address: true
