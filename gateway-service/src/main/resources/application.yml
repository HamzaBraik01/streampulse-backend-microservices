server:
  port: 8060

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/api/videos/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: security-service
          uri: lb://security-service
          predicates:
            - Path=/api/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
