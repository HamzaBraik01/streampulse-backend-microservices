server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**

        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/api/videos/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: video-service-swagger
          uri: lb://video-service
          predicates:
            - Path=/video-service/v3/api-docs/**

        - id: user-service-swagger
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs/**

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

# JWT Configuration (same secret as user-service for token validation)
jwt:
  secret: bXlTdXBlclNlY3JldEtleUZvclN0cmVhbVB1bHNlSldUQXV0aGVudGljYXRpb24yMDI2

