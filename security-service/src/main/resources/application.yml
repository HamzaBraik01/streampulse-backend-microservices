server:
  port: 8083

spring:
  application:
    name: security-service
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/user-db
    username: postgres
    password: ycode
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
