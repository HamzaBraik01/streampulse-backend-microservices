server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/video_db
    username: postgres
    password: ADMIN
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh

# TMDb API Configuration
tmdb:
  api:
    base-url: https://api.themoviedb.org/3
    key: ${TMDB_API_KEY:bd8b65a82c1a545e203f10e84c24ab58}

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.streampulse: DEBUG
