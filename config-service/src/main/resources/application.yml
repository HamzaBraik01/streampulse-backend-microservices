server:
  port: 8888

spring:
  application:
    name: config-service
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo
        # For Git-backed config (uncomment and configure):
        # git:
        #   uri: https://github.com/your-org/config-repo
        #   default-label: main
        #   clone-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
